<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DelgadoLogic — Security Auditor</title>
<meta name="description" content="DelgadoLogic Security Auditor prototype staging environment.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020617;color:#e2e8f0;font-family:'Segoe UI',Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{text-align:center;padding:48px;max-width:540px}
  .shield{font-size:48px;margin-bottom:16px}
  h1{color:#2563eb;font-size:24px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
  h2{color:#94a3b8;font-size:13px;font-weight:400;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px}
  .divider{width:48px;height:3px;background:linear-gradient(90deg,#2563eb,#22c55e);margin:0 auto 24px;border-radius:2px}
  p{color:#64748b;font-size:14px;line-height:1.7}
  .badge{display:inline-block;margin-top:24px;padding:8px 20px;border:1px solid #22c55e;border-radius:999px;color:#22c55e;font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
  .meta{margin-top:32px;font-size:11px;color:#475569}
  a{color:#2563eb;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="shield">🛡️</div>
  <h1>DELGADOLOGIC</h1>
  <h2>Security Auditor</h2>
  <div class="divider"></div>
  <p>Prototype Staging Environment</p>
  <p style="margin-top:8px;font-size:13px;color:#475569;">Infrastructure health monitoring, endpoint diagnostics, and automated security sweep reports.</p>
  <div class="badge">Staging — v0.1</div>
  <p class="meta"><a href="https://delgadologic.tech">← Back to DelgadoLogic.tech</a></p>
</div>
</body>
</html>
